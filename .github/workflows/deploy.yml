name: Deploy Game with Firebase Secrets

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Check Required Secrets
      run: |
        # Check if required Firebase secrets are configured
        if [ -z "${{ secrets.FIREBASE_TOKEN }}" ]; then
          echo "❌ FIREBASE_TOKEN secret is not configured"
          echo "Please add FIREBASE_TOKEN to your repository secrets"
          echo "You can generate a Firebase token using: firebase login:ci"
          exit 1
        fi
        
        if [ -z "${{ secrets.FIREBASE_PROJECT_ID }}" ]; then
          echo "❌ FIREBASE_PROJECT_ID secret is not configured"
          echo "Please add FIREBASE_PROJECT_ID to your repository secrets"
          exit 1
        fi
        
        echo "✅ All required Firebase secrets are configured"
        
    - name: Configure Firebase with Secrets
      run: |
        # Check if public/index.html exists
        if [ ! -f "public/index.html" ]; then
          echo "Creating public directory and copying index.html..."
          mkdir -p public
          cp index.html public/index.html
        fi
        
        # Check if secrets are available before replacing
        if [ -n "${{ secrets.FIREBASE_API_KEY }}" ]; then
          sed -i 's|"AIzaSyC1b-JWvBRGti5LFKk7LqSS8p1QFbP_D88"|"'${{ secrets.FIREBASE_API_KEY }}'"|g' public/index.html
        fi
        
        if [ -n "${{ secrets.FIREBASE_AUTH_DOMAIN }}" ]; then
          sed -i 's|"kaden---adelynn-adventures.firebaseapp.com"|"'${{ secrets.FIREBASE_AUTH_DOMAIN }}'"|g' public/index.html
        fi
        
        if [ -n "${{ secrets.FIREBASE_PROJECT_ID }}" ]; then
          sed -i 's|"kaden---adelynn-adventures"|"'${{ secrets.FIREBASE_PROJECT_ID }}'"|g' public/index.html
        fi
        
        if [ -n "${{ secrets.FIREBASE_STORAGE_BUCKET }}" ]; then
          sed -i 's|"kaden---adelynn-adventures.firebasestorage.app"|"'${{ secrets.FIREBASE_STORAGE_BUCKET }}'"|g' public/index.html
        fi
        
        if [ -n "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" ]; then
          sed -i 's|"265116401918"|"'${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}'"|g' public/index.html
        fi
        
        if [ -n "${{ secrets.FIREBASE_APP_ID }}" ]; then
          sed -i 's|"1:265116401918:web:e1511695b92aeb05e0e5af"|"'${{ secrets.FIREBASE_APP_ID }}'"|g' public/index.html
        fi
        
        if [ -n "${{ secrets.FIREBASE_MEASUREMENT_ID }}" ]; then
          sed -i 's|"G-W4Q02R318L"|"'${{ secrets.FIREBASE_MEASUREMENT_ID }}'"|g' public/index.html
        fi
        
        echo "✅ Firebase configuration updated with secrets"
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        publish_branch: gh-pages
        
    - name: Deploy to Firebase Hosting
      if: github.ref == 'refs/heads/main'
      run: |
        # Check if firebase.json exists
        if [ ! -f "firebase.json" ]; then
          echo "❌ firebase.json not found"
          exit 1
        fi
        
        # Install Firebase CLI
        npm install -g firebase-tools
        
        # Initialize Firebase (this will use the firebase.json configuration)
        firebase use "${{ secrets.FIREBASE_PROJECT_ID }}"
        
        # Deploy to Firebase Hosting using token authentication
        firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project "${{ secrets.FIREBASE_PROJECT_ID }}"
        
    - name: Show Deployment Status
      run: |
        echo "🚀 Deployment completed!"
      