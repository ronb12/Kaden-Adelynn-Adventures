<!DOCTYPE html>
<html>
<head>
    <title>Responsive Test</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial; background: #f0f0f0; }
        .test { margin: 20px 0; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .test h3 { background: #007bff; color: white; margin: 0; padding: 15px; text-align: center; }
        iframe { border: none; display: block; }
        .status { padding: 10px; background: #e9ecef; border-top: 1px solid #dee2e6; font-size: 14px; color: #495057; }
    </style>
</head>
<body>
    <h1 style="text-align: center; color: #333; margin-bottom: 30px;">🎮 Responsive Design Test</h1>
    
    <div class="test">
        <h3>📱 Mobile (375px x 667px)</h3>
        <iframe src="coin_catcher.html" width="375" height="667"></iframe>
        <div class="status">✅ Test mobile layout and touch controls</div>
    </div>
    
    <div class="test">
        <h3>📱 Tablet (768px x 1024px)</h3>
        <iframe src="coin_catcher.html" width="768" height="1024"></iframe>
        <div class="status">✅ Test tablet layout and scaling</div>
    </div>
    
    <div class="test">
        <h3>💻 Desktop (1024px x 768px)</h3>
        <iframe src="coin_catcher.html" width="1024" height="768"></iframe>
        <div class="status">✅ Test desktop experience</div>
    </div>
</body>
</html>
