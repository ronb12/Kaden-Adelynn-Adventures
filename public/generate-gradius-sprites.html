<!DOCTYPE html>
<html>
<head>
    <title>Gradius Sprite Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .sprite-preview {
            margin: 20px;
            padding: 10px;
            background: #333;
            border-radius: 10px;
        }
        canvas {
            border: 2px solid #00ffff;
            border-radius: 5px;
            background: #000;
        }
        button {
            background: #00ffff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
        }
        button:hover {
            background: #00cccc;
        }
    </style>
</head>
<body>
    <h1>🎮 Gradius-Style Sprite Generator</h1>
    <p>Generate Gradius Vic Viper-style ship sprites for your game!</p>
    
    <div class="sprite-preview">
        <h3>Gradius Vic Viper Ship</h3>
        <canvas id="gradiusCanvas" width="64" height="64"></canvas>
        <br>
        <button onclick="generateGradiusSprite()">🎯 Generate Gradius Sprite</button>
    </div>
    
    <div id="output"></div>
    
    <script>
        const canvas = document.getElementById('gradiusCanvas');
        const ctx = canvas.getContext('2d');
        
        function drawGradiusShip(ctx, color = '#00ffff') {
            // Clear canvas
            ctx.clearRect(0, 0, 64, 64);
            
            // Gradius Vic Viper ship design
            const shipColor = color;
            const accentColor = '#ffffff';
            const cockpitColor = '#87ceeb';
            const engineColor = '#ff6600';
            const cockpitDetailColor = '#000080';
            
            // Main body - nose cone
            ctx.fillStyle = shipColor;
            ctx.beginPath();
            ctx.moveTo(32, 8);
            ctx.lineTo(28, 16);
            ctx.lineTo(36, 16);
            ctx.closePath();
            ctx.fill();
            
            // Main body - fuselage
            ctx.beginPath();
            ctx.moveTo(28, 16);
            ctx.lineTo(24, 32);
            ctx.lineTo(22, 40);
            ctx.lineTo(20, 48);
            ctx.lineTo(18, 56);
            ctx.lineTo(46, 56);
            ctx.lineTo(44, 48);
            ctx.lineTo(42, 40);
            ctx.lineTo(40, 32);
            ctx.lineTo(36, 16);
            ctx.closePath();
            ctx.fill();
            
            // Wings
            ctx.fillStyle = shipColor;
            // Left wing
            ctx.beginPath();
            ctx.moveTo(24, 32);
            ctx.lineTo(16, 40);
            ctx.lineTo(14, 48);
            ctx.lineTo(20, 48);
            ctx.lineTo(22, 40);
            ctx.closePath();
            ctx.fill();
            
            // Right wing
            ctx.beginPath();
            ctx.moveTo(40, 32);
            ctx.lineTo(48, 40);
            ctx.lineTo(50, 48);
            ctx.lineTo(44, 48);
            ctx.lineTo(42, 40);
            ctx.closePath();
            ctx.fill();
            
            // Engine details (orange thrusters)
            ctx.fillStyle = engineColor;
            ctx.fillRect(26, 44, 3, 8);
            ctx.fillRect(35, 44, 3, 8);
            
            // Cockpit
            ctx.fillStyle = cockpitColor;
            ctx.beginPath();
            ctx.ellipse(32, 28, 6, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Cockpit details
            ctx.fillStyle = cockpitDetailColor;
            ctx.beginPath();
            ctx.ellipse(32, 28, 3, 2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Ship details
            ctx.fillStyle = accentColor;
            // Nose detail
            ctx.fillRect(31, 10, 2, 4);
            
            // Body line
            ctx.beginPath();
            ctx.moveTo(32, 16);
            ctx.lineTo(32, 48);
            ctx.strokeStyle = accentColor;
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // Wing details
            ctx.fillStyle = accentColor;
            ctx.fillRect(30, 36, 4, 2);
            ctx.fillRect(30, 42, 4, 2);
        }
        
        function generateGradiusSprite() {
            // Generate different colored versions
            const colors = [
                { name: 'fighter-01', color: '#00ffff' }, // Cyan
                { name: 'fighter-02', color: '#00ff00' }, // Green
                { name: 'fighter-03', color: '#ff00ff' }  // Magenta
            ];
            
            colors.forEach((sprite, index) => {
                setTimeout(() => {
                    drawGradiusShip(ctx, sprite.color);
                    
                    const dataUrl = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = sprite.name + '.png';
                    link.href = dataUrl;
                    link.click();
                    
                    document.getElementById('output').innerHTML += 
                        `<p>✅ Generated: ${sprite.name}.png (${sprite.color})</p>`;
                }, index * 500);
            });
            
            // Draw the first one for preview
            drawGradiusShip(ctx, '#00ffff');
        }
        
        // Initial preview
        drawGradiusShip(ctx, '#00ffff');
    </script>
</body>
</html>
