<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Wing Fighters</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: white;
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(to bottom, #000011, #000033, #000011);
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #score, #lives, #level {
            margin-bottom: 10px;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 200;
        }

        #gameOver h2 {
            color: #ff4444;
            margin-bottom: 20px;
            font-size: 36px;
        }

        #gameOver button {
            background: #4444ff;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }

        #gameOver button:hover {
            background: #6666ff;
        }

        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 200;
        }

        #startScreen h1 {
            color: #4444ff;
            margin-bottom: 20px;
            font-size: 48px;
        }

        #startScreen p {
            margin-bottom: 30px;
            font-size: 18px;
        }

        #startScreen button {
            background: #4444ff;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        #startScreen button:hover {
            background: #6666ff;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="lives">Lives: 3</div>
        <div id="level">Level: 1</div>
    </div>

    <div id="startScreen">
        <h1>🚀 Space Wing Fighters</h1>
        <p>Use WASD or Arrow Keys to move<br>Spacebar to shoot<br>Destroy enemies to survive!</p>
        <button onclick="startGame()">START GAME</button>
    </div>

    <div id="gameOver">
        <h2>Game Over!</h2>
        <div id="finalScore">Final Score: 0</div>
        <button onclick="restartGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let level = 1;
        
        // Player
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            width: 40,
            height: 40,
            speed: 5,
            bullets: [],
            lastShot: 0,
            shotCooldown: 200
        };
        
        // Game objects
        let enemies = [];
        let particles = [];
        
        // Input
        const keys = {};
        
        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        function startGame() {
            gameRunning = true;
            score = 0;
            lives = 3;
            level = 1;
            player.x = canvas.width / 2;
            player.y = canvas.height - 100;
            player.bullets = [];
            enemies = [];
            particles = [];
            
            document.getElementById('startScreen').style.display = 'none';
            gameLoop();
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = `Final Score: ${score}`;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }
        
        function drawPlayer() {
            // Player wing fighter design
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Engine glow
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 20;
            
            // Main body
            ctx.fillStyle = '#4444ff';
            ctx.beginPath();
            ctx.moveTo(0, -20);
            ctx.lineTo(-15, 10);
            ctx.lineTo(-8, 20);
            ctx.lineTo(8, 20);
            ctx.lineTo(15, 10);
            ctx.closePath();
            ctx.fill();
            
            // Wings
            ctx.fillStyle = '#6666ff';
            ctx.beginPath();
            ctx.moveTo(-15, 10);
            ctx.lineTo(-25, 5);
            ctx.lineTo(-20, 15);
            ctx.lineTo(-8, 20);
            ctx.closePath();
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(15, 10);
            ctx.lineTo(25, 5);
            ctx.lineTo(20, 15);
            ctx.lineTo(8, 20);
            ctx.closePath();
            ctx.fill();
            
            // Cockpit
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Engine exhaust
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.ellipse(0, 20, 3, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        function drawEnemy(enemy) {
            ctx.save();
            ctx.translate(enemy.x, enemy.y);
            
            // Enemy wing fighter design
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 15;
            
            // Main body
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.moveTo(0, 20);
            ctx.lineTo(-12, -5);
            ctx.lineTo(-6, -15);
            ctx.lineTo(6, -15);
            ctx.lineTo(12, -5);
            ctx.closePath();
            ctx.fill();
            
            // Wings
            ctx.fillStyle = '#cc0000';
            ctx.beginPath();
            ctx.moveTo(-12, -5);
            ctx.lineTo(-20, -10);
            ctx.lineTo(-15, 0);
            ctx.lineTo(-6, -15);
            ctx.closePath();
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(12, -5);
            ctx.lineTo(20, -10);
            ctx.lineTo(15, 0);
            ctx.lineTo(6, -15);
            ctx.closePath();
            ctx.fill();
            
            // Cockpit
            ctx.fillStyle = '#ff6666';
            ctx.beginPath();
            ctx.arc(0, 0, 4, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        function drawBullet(bullet) {
            ctx.save();
            ctx.translate(bullet.x, bullet.y);
            
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 10;
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.arc(0, 0, 3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        function drawParticle(particle) {
            ctx.save();
            ctx.translate(particle.x, particle.y);
            
            ctx.globalAlpha = particle.alpha;
            ctx.fillStyle = particle.color;
            ctx.beginPath();
            ctx.arc(0, 0, particle.size, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        function updatePlayer() {
            // Movement
            if (keys['KeyA'] || keys['ArrowLeft']) player.x -= player.speed;
            if (keys['KeyD'] || keys['ArrowRight']) player.x += player.speed;
            if (keys['KeyW'] || keys['ArrowUp']) player.y -= player.speed;
            if (keys['KeyS'] || keys['ArrowDown']) player.y += player.speed;
            
            // Keep player on screen
            player.x = Math.max(player.width/2, Math.min(canvas.width - player.width/2, player.x));
            player.y = Math.max(player.height/2, Math.min(canvas.height - player.height/2, player.y));
            
            // Shooting
            if ((keys['Space'] || keys['KeyX']) && Date.now() - player.lastShot > player.shotCooldown) {
                player.bullets.push({
                    x: player.x,
                    y: player.y - 20,
                    speed: 10
                });
                player.lastShot = Date.now();
            }
        }
        
        function updateBullets() {
            player.bullets = player.bullets.filter(bullet => {
                bullet.y -= bullet.speed;
                return bullet.y > 0;
            });
        }
        
        function spawnEnemy() {
            if (Math.random() < 0.02 + level * 0.005) {
                enemies.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -40,
                    width: 30,
                    height: 30,
                    speed: 2 + Math.random() * 2
                });
            }
        }
        
        function updateEnemies() {
            enemies = enemies.filter(enemy => {
                enemy.y += enemy.speed;
                
                // Check collision with bullets
                player.bullets.forEach((bullet, bulletIndex) => {
                    if (Math.abs(bullet.x - enemy.x) < 20 && Math.abs(bullet.y - enemy.y) < 20) {
                        // Create explosion particles
                        for (let i = 0; i < 8; i++) {
                            particles.push({
                                x: enemy.x,
                                y: enemy.y,
                                vx: (Math.random() - 0.5) * 10,
                                vy: (Math.random() - 0.5) * 10,
                                size: Math.random() * 3 + 2,
                                color: '#ffaa00',
                                alpha: 1,
                                life: 30
                            });
                        }
                        
                        player.bullets.splice(bulletIndex, 1);
                        score += 100;
                        return false;
                    }
                });
                
                // Check collision with player
                if (Math.abs(player.x - enemy.x) < 25 && Math.abs(player.y - enemy.y) < 25) {
                    lives--;
                    if (lives <= 0) {
                        gameOver();
                        return false;
                    }
                    
                    // Create explosion particles
                    for (let i = 0; i < 10; i++) {
                        particles.push({
                            x: player.x,
                            y: player.y,
                            vx: (Math.random() - 0.5) * 8,
                            vy: (Math.random() - 0.5) * 8,
                            size: Math.random() * 4 + 2,
                            color: '#ff4444',
                            alpha: 1,
                            life: 40
                        });
                    }
                    
                    return false;
                }
                
                return enemy.y < canvas.height + 40;
            });
        }
        
        function updateParticles() {
            particles = particles.filter(particle => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.alpha -= 1 / particle.life;
                particle.life--;
                return particle.life > 0 && particle.alpha > 0;
            });
        }
        
        function updateLevel() {
            level = Math.floor(score / 1000) + 1;
        }
        
        function updateUI() {
            document.getElementById('score').textContent = `Score: ${score}`;
            document.getElementById('lives').textContent = `Lives: ${lives}`;
            document.getElementById('level').textContent = `Level: ${level}`;
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            // Clear canvas
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Update game objects
            updatePlayer();
            updateBullets();
            spawnEnemy();
            updateEnemies();
            updateParticles();
            updateLevel();
            updateUI();
            
            // Draw everything
            drawPlayer();
            enemies.forEach(drawEnemy);
            player.bullets.forEach(drawBullet);
            particles.forEach(drawParticle);
            
            requestAnimationFrame(gameLoop);
        }
        
        // Start the game loop for the start screen
        function startScreenLoop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            requestAnimationFrame(startScreenLoop);
        }
        
        startScreenLoop();
    </script>
</body>
</html>
