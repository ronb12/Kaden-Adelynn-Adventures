name: Deploy Game with Firebase Secrets

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Check Required Secrets
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      run: |
        # Check if required Firebase secrets are configured
        if [ -z "$FIREBASE_TOKEN" ]; then
          echo "❌ FIREBASE_TOKEN secret is not configured"
          echo "Please add FIREBASE_TOKEN to your repository secrets"
          exit 1
        fi
        
        if [ -z "$FIREBASE_PROJECT_ID" ]; then
          echo "❌ FIREBASE_PROJECT_ID secret is not configured"
          echo "Please add FIREBASE_PROJECT_ID to your repository secrets"
          exit 1
        fi
        
        echo "✅ All required Firebase secrets are configured"
        
    - name: Configure Firebase with Secrets
      env:
        FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
        FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
        FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
        FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
      run: |
        # Check if public/index.html exists
        if [ ! -f "public/index.html" ]; then
          echo "❌ public/index.html not found"
          echo "Creating public directory and copying index.html..."
          mkdir -p public
          cp index.html public/index.html
        fi
        
        # Check if secrets are available before replacing
        if [ -n "$FIREBASE_API_KEY" ]; then
          sed -i 's|"AIzaSyC1b-JWvBRGti5LFKk7LqSS8p1QFbP_D88"|"'$FIREBASE_API_KEY'"|g' public/index.html
        fi
        
        if [ -n "$FIREBASE_AUTH_DOMAIN" ]; then
          sed -i 's|"kaden---adelynn-adventures.firebaseapp.com"|"'$FIREBASE_AUTH_DOMAIN'"|g' public/index.html
        fi
        
        if [ -n "$FIREBASE_PROJECT_ID" ]; then
          sed -i 's|"kaden---adelynn-adventures"|"'$FIREBASE_PROJECT_ID'"|g' public/index.html
        fi
        
        if [ -n "$FIREBASE_STORAGE_BUCKET" ]; then
          sed -i 's|"kaden---adelynn-adventures.firebasestorage.app"|"'$FIREBASE_STORAGE_BUCKET'"|g' public/index.html
        fi
        
        if [ -n "$FIREBASE_MESSAGING_SENDER_ID" ]; then
          sed -i 's|"265116401918"|"'$FIREBASE_MESSAGING_SENDER_ID'"|g' public/index.html
        fi
        
        if [ -n "$FIREBASE_APP_ID" ]; then
          sed -i 's|"1:265116401918:web:e1511695b92aeb05e0e5af"|"'$FIREBASE_APP_ID'"|g' public/index.html
        fi
        
        if [ -n "$FIREBASE_MEASUREMENT_ID" ]; then
          sed -i 's|"G-W4Q02R318L"|"'$FIREBASE_MEASUREMENT_ID'"|g' public/index.html
        fi
        
        echo "✅ Firebase configuration updated with secrets"
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        publish_branch: gh-pages
        
    - name: Deploy to Firebase Hosting
      if: github.ref == 'refs/heads/main'
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      run: |
        # Check if firebase.json exists
        if [ ! -f "firebase.json" ]; then
          echo "❌ firebase.json not found"
          exit 1
        fi
        
        # Install Firebase CLI
        npm install -g firebase-tools
        
        # Initialize Firebase (this will use the firebase.json configuration)
        firebase use "$FIREBASE_PROJECT_ID"
        
        # Deploy to Firebase Hosting using token authentication
        firebase deploy --only hosting --token "$FIREBASE_TOKEN" --project "$FIREBASE_PROJECT_ID"
        
    - name: Show Deployment Status
      env:
        FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      run: |
        echo "🚀 Deployment completed!"
        echo "📊 GitHub Pages: https://ronb12.github.io/Kaden-Adelynn-Adventures/"
        echo "🔥 Firebase Hosting: https://$FIREBASE_PROJECT_ID.web.app"
        echo "✅ Firebase configuration injected successfully" 