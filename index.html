<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaden & Adelynn Adventures - Temple Run Style!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🏛️ Kaden & Adelynn Adventures 🏃‍♂️</h1>
            <div class="score-board">
                <div class="score">Score: <span id="score">0</span></div>
                <div class="high-score">Best: <span id="highScore">0</span></div>
                <div class="distance">Distance: <span id="distance">0</span>m</div>
            </div>
        </div>
        
        <div class="game-area">
            <div class="temple-background">
                <div class="temple-ruins"></div>
                <div class="ground-texture"></div>
            </div>
            
            <div class="player" id="player">🏃‍♂️</div>
            
            <div class="game-overlay" id="gameOverlay">
                <div class="start-screen" id="startScreen">
                    <h2>🏛️ Temple Adventure Awaits! 🏛️</h2>
                    <p>Run through ancient ruins and escape the temple!</p>
                    <div class="controls-info">
                        <div class="control-item">
                            <span class="key">SPACE</span>
                            <span class="action">Jump</span>
                        </div>
                        <div class="control-item">
                            <span class="key">↓</span>
                            <span class="action">Slide</span>
                        </div>
                        <div class="control-item">
                            <span class="key">←</span>
                            <span class="action">Left</span>
                        </div>
                        <div class="control-item">
                            <span class="key">→</span>
                            <span class="action">Right</span>
                        </div>
                    </div>
                    <button id="startButton" class="start-btn">🏃‍♂️ Start Adventure!</button>
                </div>
                <div class="game-over-screen" id="gameOverScreen" style="display: none;">
                    <h2>🏛️ Temple Escape Failed! 🏛️</h2>
                    <p>Distance: <span id="finalDistance">0</span>m</p>
                    <p>Score: <span id="finalScore">0</span></p>
                    <button id="restartButton" class="restart-btn">🏃‍♂️ Try Again!</button>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <div class="control-hint">
                <span>🎮 Temple Controls:</span>
                <span>SPACE = Jump</span>
                <span>↓ = Slide</span>
                <span>←→ = Move</span>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
