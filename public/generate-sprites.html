<!DOCTYPE html>
<html>
<head>
    <title>Sprite Generator</title>
</head>
<body>
    <h1>Sprite Generator for Kaden & Adelynn Adventures</h1>
    <p>This will generate sprite images for the game. Open the console to see progress.</p>
    <div id="output"></div>
    
    <script>
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 64;
        canvas.height = 64;
        
        function generateSprite(name, color, type) {
            canvas.width = 64;
            canvas.height = 64;
            ctx.clearRect(0, 0, 64, 64);
            
            if (type === 'player') {
                drawGradiusShip(ctx, color);
            } else {
                drawEnemyShip(ctx, color, name);
            }
            
            const dataUrl = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = name + '.png';
            link.href = dataUrl;
            link.click();
            
            console.log(`Generated: ${name}.png`);
        }
        
        function drawGradiusShip(ctx, color) {
            // Gradius Vic Viper ship design
            const shipColor = color;
            const accentColor = '#ffffff';
            const cockpitColor = '#87ceeb';
            
            // Main body
            ctx.fillStyle = shipColor;
            ctx.beginPath();
            // Nose cone
            ctx.moveTo(32, 8);
            ctx.lineTo(28, 16);
            ctx.lineTo(36, 16);
            ctx.closePath();
            ctx.fill();
            
            // Main body
            ctx.beginPath();
            ctx.moveTo(28, 16);
            ctx.lineTo(24, 32);
            ctx.lineTo(22, 40);
            ctx.lineTo(20, 48);
            ctx.lineTo(18, 56);
            ctx.lineTo(46, 56);
            ctx.lineTo(44, 48);
            ctx.lineTo(42, 40);
            ctx.lineTo(40, 32);
            ctx.lineTo(36, 16);
            ctx.closePath();
            ctx.fill();
            
            // Wings
            ctx.fillStyle = shipColor;
            ctx.beginPath();
            // Left wing
            ctx.moveTo(24, 32);
            ctx.lineTo(16, 40);
            ctx.lineTo(14, 48);
            ctx.lineTo(20, 48);
            ctx.lineTo(22, 40);
            ctx.closePath();
            ctx.fill();
            
            // Right wing
            ctx.beginPath();
            ctx.moveTo(40, 32);
            ctx.lineTo(48, 40);
            ctx.lineTo(50, 48);
            ctx.lineTo(44, 48);
            ctx.lineTo(42, 40);
            ctx.closePath();
            ctx.fill();
            
            // Engine details
            ctx.fillStyle = '#ff6600';
            ctx.fillRect(26, 44, 3, 8);
            ctx.fillRect(35, 44, 3, 8);
            
            // Cockpit
            ctx.fillStyle = cockpitColor;
            ctx.beginPath();
            ctx.ellipse(32, 28, 6, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Cockpit details
            ctx.fillStyle = '#000080';
            ctx.beginPath();
            ctx.ellipse(32, 28, 3, 2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Ship details
            ctx.fillStyle = accentColor;
            // Nose detail
            ctx.fillRect(31, 10, 2, 4);
            
            // Body line
            ctx.beginPath();
            ctx.moveTo(32, 16);
            ctx.lineTo(32, 48);
            ctx.strokeStyle = accentColor;
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // Wing details
            ctx.fillStyle = accentColor;
            ctx.fillRect(30, 36, 4, 2);
            ctx.fillRect(30, 42, 4, 2);
        }
        
        function drawEnemyShip(ctx, color, type) {
            ctx.fillStyle = color;
            ctx.beginPath();
            
            switch(type) {
                case 'basic-enemy':
                    ctx.moveTo(32, 56);
                    ctx.lineTo(44, 16);
                    ctx.lineTo(40, 16);
                    ctx.lineTo(32, 48);
                    ctx.lineTo(24, 48);
                    ctx.lineTo(20, 16);
                    ctx.lineTo(16, 16);
                    ctx.closePath();
                    break;
                case 'fast-enemy':
                    ctx.moveTo(32, 56);
                    ctx.lineTo(40, 16);
                    ctx.lineTo(36, 16);
                    ctx.lineTo(32, 48);
                    ctx.lineTo(28, 48);
                    ctx.lineTo(24, 16);
                    ctx.lineTo(20, 16);
                    ctx.closePath();
                    break;
                case 'tank-enemy':
                    ctx.moveTo(32, 56);
                    ctx.lineTo(48, 16);
                    ctx.lineTo(44, 16);
                    ctx.lineTo(36, 48);
                    ctx.lineTo(28, 48);
                    ctx.lineTo(20, 16);
                    ctx.lineTo(16, 16);
                    ctx.closePath();
                    break;
                case 'boss-enemy':
                    ctx.moveTo(32, 56);
                    ctx.lineTo(56, 16);
                    ctx.lineTo(52, 16);
                    ctx.lineTo(40, 48);
                    ctx.lineTo(24, 48);
                    ctx.lineTo(12, 16);
                    ctx.lineTo(8, 16);
                    ctx.closePath();
                    break;
            }
            
            ctx.fill();
            
            // Enemy cockpit
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.ellipse(32, 32, 3, 2, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Generate all sprites
        console.log('Starting sprite generation...');
        
        // Player sprites (Gradius style)
        generateSprite('fighter-01', '#00ffff', 'player'); // Cyan Gradius ship
        generateSprite('fighter-02', '#00ff00', 'player'); // Green Gradius ship
        generateSprite('fighter-03', '#ff00ff', 'player'); // Magenta Gradius ship
        
        // Enemy sprites
        generateSprite('basic-enemy', '#ff0000', 'enemy');
        generateSprite('fast-enemy', '#ff6600', 'enemy');
        generateSprite('tank-enemy', '#660066', 'enemy');
        generateSprite('boss-enemy', '#ff0066', 'enemy');
        
        console.log('All sprites generated successfully!');
        document.getElementById('output').innerHTML = '<p>✅ All sprites generated! Check your downloads folder.</p>';
    </script>
</body>
</html>
