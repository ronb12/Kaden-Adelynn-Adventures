<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Kaden & Adelynn Space Adventures</title>
    <link rel="stylesheet" href="style.css?v=1.6">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>'">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="ui-overlay">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="high-score">High Score: <span id="highScore">0</span></div>
            <div class="lives">Lives: <span id="lives">50</span></div>
            <div class="level">Level: <span id="level">1</span></div>
            <div class="weapon">Weapon: <span id="weapon">1</span></div>
            <div class="sound">Sound: <span id="sound">ON</span></div>
        </div>
        <div id="gameOver" class="game-over hidden">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>High Score: <span id="finalHighScore">0</span></p>
            <div id="achievementsEarned" class="achievements-earned"></div>
            <button id="restartBtn" class="game-button">
                <span class="button-text">Play Again</span>
                <span class="button-icon">🔄</span>
            </button>
        </div>
        <div id="startScreen" class="start-screen">
            <h1>Kaden & Adelynn<br>Space Adventures</h1>
            <p>Use arrow keys or WASD to move</p>
            <p>Spacebar or click to shoot</p>
            <p>Shift to activate shield</p>
            <p>M to toggle sound</p>
            <p>50 Lives • Enemy Ships Shoot Back • Achievements</p>
            <button id="startBtn" class="game-button">
                <span class="button-text">Start Game</span>
                <span class="button-icon">🚀</span>
            </button>
        </div>
    </div>
    <script>
        // Force cache refresh and unregister service workers
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
        
        // Clear browser cache for this page
        if ('caches' in window) {
            caches.keys().then(function(names) {
                for (let name of names) {
                    caches.delete(name);
                }
            });
        }
        
        // Force reload if this is a cached version
        if (performance.navigation.type === 1) {
            // This is a reload, force fresh content
            window.location.reload(true);
        }
    </script>
    <script src="main.js?v=1.8"></script>
</body>
</html>
