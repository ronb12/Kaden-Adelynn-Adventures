<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .game-container {
            text-align: center;
            position: relative;
        }
        
        #gameCanvas {
            border: 2px solid #4a90e2;
            background: #000;
            display: none;
        }
        
        .screen {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #4a90e2;
            max-width: 600px;
            margin: 20px;
        }
        
        .game-title {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #4a90e2;
            text-shadow: 0 0 10px #4a90e2;
        }
        
        .game-subtitle {
            font-size: 1.2em;
            margin-bottom: 30px;
            color: #ccc;
        }
        
        .controls {
            background: rgba(74, 144, 226, 0.1);
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid #4a90e2;
        }
        
        .controls h3 {
            color: #4a90e2;
            margin-bottom: 10px;
        }
        
        .controls ul {
            text-align: left;
            list-style: none;
        }
        
        .controls li {
            margin: 5px 0;
            padding: 5px 0;
        }
        
        .controls li:before {
            content: "▶ ";
            color: #4a90e2;
        }
        
        button {
            background: linear-gradient(45deg, #4a90e2, #357abd);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        
        button:hover {
            background: linear-gradient(45deg, #357abd, #4a90e2);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }
        
        .score-display {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #4a90e2;
        }
        
        .score-display div {
            margin: 5px 0;
        }
        
        .hidden {
            display: none !important;
        }
        
        .final-score {
            font-size: 2em;
            color: #4a90e2;
            margin: 20px 0;
        }
        
        .high-score {
            font-size: 1.2em;
            color: #ffd700;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Start Screen -->
        <div id="startScreen" class="screen">
            <h1 class="game-title">🚀 Space Shooter 🚀</h1>
            <p class="game-subtitle">Defend the galaxy from enemy ships!</p>
            
            <div class="controls">
                <h3>🎮 Controls</h3>
                <ul>
                    <li>Arrow Keys or WASD - Move ship</li>
                    <li>Spacebar - Shoot</li>
                    <li>Destroy enemies to score points</li>
                    <li>Avoid letting enemies pass you</li>
                </ul>
            </div>
            
            <button id="startBtn">Start Game</button>
        </div>
        
        <!-- Game Canvas -->
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <!-- Score Display -->
        <div id="scoreDisplay" class="score-display hidden">
            <div>Score: <span id="score">0</span></div>
            <div>Lives: <span id="lives">3</span></div>
            <div>Level: <span id="level">1</span></div>
        </div>
        
        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="screen hidden">
            <h2>Game Over!</h2>
            <div class="final-score">Final Score: <span id="finalScore">0</span></div>
            <div class="high-score">High Score: <span id="highScore">0</span></div>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>
    
    <script src="js/main.js?v=1.1"></script>
</body>
</html>
