<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="An epic space shooter game with multiple characters, weapons, and game modes" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4ecdc4" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Space Adventures" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    
    <!-- Prevent iOS Safari from adding address bar -->
    <meta name="format-detection" content="telephone=no" />
    
    <title>Kaden & Adelynn Space Adventures</title>
    
    <style>
      /* Prevent iOS bounce scrolling and address bar issues */
      html, body {
        height: 100%;
        width: 100%;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        margin: 0;
        padding: 0;
      }
      
      /* Allow scrolling on body when menu is present */
      body:has(.main-menu) {
        overflow: auto;
        position: relative;
        -webkit-overflow-scrolling: touch;
      }
      
      /* Prevent bounce when not on menu */
      body:not(:has(.main-menu)) {
        overflow: hidden;
        position: fixed;
      }
      
      #root {
        height: 100%;
        width: 100%;
        position: relative;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      
      /* Allow scrolling on main menu */
      .main-menu {
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
        touch-action: pan-y;
        position: relative;
      }
      
      /* Prevent text selection on iOS */
      * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker for PWA with update checking
      if ('serviceWorker' in navigator) {
        let refreshing = false
        
        // Register service worker
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
          .then((registration) => {
            console.log('SW registered:', registration)
            
            // Check for updates every hour
            setInterval(() => {
              registration.update()
            }, 3600000) // 1 hour
            
            // Listen for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing
              console.log('SW update found, installing new version')
              
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New service worker is ready, prompt user to refresh
                  console.log('New SW installed, ready to activate')
                  // Optionally show update notification to user
                  if (confirm('A new version is available! Reload to update?')) {
                    newWorker.postMessage({ type: 'SKIP_WAITING' })
                    window.location.reload()
                  }
                }
              })
            })
            
            // Listen for messages from service worker
            navigator.serviceWorker.addEventListener('message', (event) => {
              if (event.data && event.data.type === 'SW_UPDATED') {
                console.log('SW updated to version:', event.data.version)
                if (!refreshing) {
                  refreshing = true
                  window.location.reload()
                }
              }
            })
          })
          .catch((error) => {
            console.log('SW registration failed:', error)
          })
        
        // Check for updates on page visibility change
        document.addEventListener('visibilitychange', () => {
          if (!document.hidden && 'serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistration().then((registration) => {
              if (registration) {
                registration.update()
              }
            })
          }
        })
      }
      
      // Prevent iOS Safari bounce scrolling (but allow menu scrolling)
      document.addEventListener('touchmove', (e) => {
        // Allow scrolling on main menu, menu container, and scrollable elements
        const target = e.target
        const isInMenu = target.closest('.main-menu') || 
                        target.closest('.menu-container') || 
                        target.closest('.scrollable') ||
                        document.querySelector('.main-menu')?.contains(target)
        
        if (isInMenu) {
          return // Allow scrolling
        }
        
        // Only prevent default for non-scrollable areas
        e.preventDefault()
      }, { passive: false })
      
      // Fix iOS viewport height issue
      function setViewportHeight() {
        const vh = window.innerHeight * 0.01
        document.documentElement.style.setProperty('--vh', `${vh}px`)
      }
      setViewportHeight()
      window.addEventListener('resize', setViewportHeight)
      window.addEventListener('orientationchange', () => {
        setTimeout(setViewportHeight, 100)
      })
      
      // Prevent double-tap zoom on iOS (but allow on menu)
      let lastTouchEnd = 0
      document.addEventListener('touchend', (e) => {
        const isInMenu = e.target.closest('.main-menu') || 
                        e.target.closest('.menu-container')
        if (isInMenu) {
          return // Allow double-tap in menu
        }
        const now = Date.now()
        if (now - lastTouchEnd <= 300) {
          e.preventDefault()
        }
        lastTouchEnd = now
      }, false)
      
      // Toggle body class based on menu presence
      function updateBodyScroll() {
        const menu = document.querySelector('.main-menu')
        if (menu) {
          document.body.classList.add('menu-active')
        } else {
          document.body.classList.remove('menu-active')
        }
      }
      
      // Watch for menu changes
      const observer = new MutationObserver(updateBodyScroll)
      observer.observe(document.getElementById('root'), {
        childList: true,
        subtree: true
      })
      
      // Initial check
      setTimeout(updateBodyScroll, 100)
    </script>
  </body>
</html>
