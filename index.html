<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaden & Adelynn Adventures - Fun Game!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🏃‍♂️ Kaden & Adelynn Adventures 🏃‍♀️</h1>
            <div class="score-board">
                <div class="score">Score: <span id="score">0</span></div>
                <div class="high-score">Best: <span id="highScore">0</span></div>
            </div>
        </div>
        
        <div class="game-area">
            <div class="player" id="player">🏃‍♂️</div>
            <div class="game-overlay" id="gameOverlay">
                <div class="start-screen" id="startScreen">
                    <h2>Ready for an Adventure?</h2>
                    <p>Use SPACE to jump, DOWN ARROW to slide!</p>
                    <button id="startButton" class="start-btn">Start Game!</button>
                </div>
                <div class="game-over-screen" id="gameOverScreen" style="display: none;">
                    <h2>Game Over!</h2>
                    <p>Your score: <span id="finalScore">0</span></p>
                    <button id="restartButton" class="restart-btn">Play Again!</button>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <div class="control-hint">
                <span>🎮 Controls:</span>
                <span>SPACE = Jump</span>
                <span>↓ = Slide</span>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
