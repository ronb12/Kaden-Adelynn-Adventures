<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kaden & Adelynn Coin Catcher Adventure! 🚀</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: 'Comic Sans MS', 'Bubblegum Sans', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            min-width: 100vw;
            min-height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
            touch-action: none;
        }

        html {
            width: 100vw;
            height: 100vh;
            min-width: 100vw;
            min-height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
        }

        /* Animated Background Stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .star:nth-child(3n) {
            background: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
        }

        .star:nth-child(3n+1) {
            background: #ff6b6b;
            box-shadow: 0 0 12px rgba(255, 107, 107, 0.8);
        }

        .star:nth-child(3n+2) {
            background: #4ecdc4;
            box-shadow: 0 0 12px rgba(78, 205, 196, 0.8);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        #gameContainer, .gameArea {
            width: 100vw;
            height: 100vh;
            min-width: 100vw;
            min-height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
            overflow: hidden;
            position: fixed;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: stretch;
        }

        /* Game Area with Enhanced Parallax Background */
        .gameArea {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 107, 107, 0.2) 0%, transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(52, 152, 219, 0.2) 0%, transparent 60%),
                radial-gradient(circle at 40% 40%, rgba(155, 89, 182, 0.2) 0%, transparent 60%),
                radial-gradient(circle at 60% 60%, rgba(46, 204, 113, 0.15) 0%, transparent 60%);
        }

        /* Center overlays with flex */
        #characterSelect, #gameOver, #pauseMenu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.01);
            z-index: 100;
        }
        .overlay-flex {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .overlay-content {
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            padding: 4vw 4vw;
            border-radius: 2vw;
            background: rgba(255,255,255,0.97);
            box-shadow: 0 0 4vw rgba(0,0,0,0.2);
        }
        /* Use .overlay-content for inner overlay boxes */
        #characterSelect > div:not(.character-grid), #gameOver > div, #pauseMenu > div {
            margin: 0 auto;
        }

        /* UI panels anchored to corners with padding */
        #ui {
            position: absolute;
            top: 2vw; left: 2vw; right: 2vw;
            display: flex;
            justify-content: space-between;
            gap: 2vw;
            z-index: 10;
        }
        .ui-panel {
            min-width: 18vw;
            padding: 2vw 2vw;
            font-size: 2vw;
            border-radius: 1vw;
            background: rgba(0,0,0,0.7);
            color: #fff;
            box-shadow: 0 0 1vw rgba(0,0,0,0.2);
        }

        /* Enhanced Character Selection Screen */
        #characterSelect h1 {
            color: #ff6b6b;
            font-size: 3em;
            margin-bottom: 25px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            background: linear-gradient(45deg, #ff6b6b, #ffd700, #4ecdc4, #ff6b6b);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        #characterSelect p {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 2vw;
        }

        .character-option {
            font-size: 6vw;
            min-width: 60px; min-height: 60px;
            padding: 2vw;
            border-radius: 1vw;
            background: #eee;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .character-option.selected, .character-option:hover {
            background: #ffd700;
            box-shadow: 0 0 1vw #ffd700;
        }

        /* Enhanced Player Character */
        #player {
            position: absolute;
            left: 50%;
            bottom: 10vh;
            transform: translateX(-50%);
            width: 10vw; height: 10vw;
            min-width: 60px; min-height: 60px;
            max-width: 120px; max-height: 120px;
            font-size: 7vw;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            background: linear-gradient(135deg, #3498db, #2980b9);
            box-shadow: 0 0 2vw #2980b9;
            z-index: 5;
        }

        #player::before { content: '👨‍🎮'; }

        /* Enhanced Game Objects */
        .coin {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border-radius: 50%;
            border: 5px solid #ff8c00;
            box-shadow: 
                0 8px 16px rgba(0,0,0,0.4),
                0 0 30px rgba(255, 215, 0, 0.8);
            z-index: 5;
            animation: coinFloat 2s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
        }

        .coin::before { content: '💰'; }

        @keyframes coinFloat {
            0%, 100% { transform: translateY(0px) rotateY(0deg) scale(1); }
            50% { transform: translateY(-15px) rotateY(180deg) scale(1.1); }
        }

        .shark {
            position: absolute;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #34495e, #2c3e50);
            border-radius: 20px;
            border: 5px solid #1a252f;
            box-shadow: 
                0 8px 16px rgba(0,0,0,0.5),
                0 0 30px rgba(52, 73, 94, 0.8);
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            animation: sharkSwim 1.5s ease-in-out infinite;
        }

        .shark::before { content: '🦈'; }

        @keyframes sharkSwim {
            0%, 100% { transform: translateX(0px) rotateY(0deg); }
            50% { transform: translateX(8px) rotateY(5deg); }
        }

        .powerup {
            position: absolute;
            width: 55px;
            height: 55px;
            border-radius: 15px;
            border: 5px solid;
            box-shadow: 
                0 8px 16px rgba(0,0,0,0.4),
                0 0 35px currentColor;
            z-index: 5;
            animation: powerupGlow 2s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .powerup.speed {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border-color: #a93226;
            color: #e74c3c;
        }

        .powerup.speed::before { content: '⚡'; }

        .powerup.shield {
            background: linear-gradient(135deg, #3498db, #2980b9);
            border-color: #2c3e50;
            color: #3498db;
        }

        .powerup.shield::before { content: '🛡️'; }

        .powerup.multishot {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            border-color: #6c3483;
            color: #9b59b6;
        }

        .powerup.multishot::before { content: '🎯'; }

        .powerup.timefreeze {
            background: linear-gradient(135deg, #1abc9c, #16a085);
            border-color: #138d75;
            color: #1abc9c;
        }

        .powerup.timefreeze::before { content: '⏰'; }

        .powerup.autoshoot {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border-color: #d35400;
            color: #f39c12;
        }

        .powerup.autoshoot::before { content: '🎮'; }

        @keyframes powerupGlow {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 16px rgba(0,0,0,0.4), 0 0 35px currentColor; }
            50% { transform: scale(1.15); box-shadow: 0 12px 24px rgba(0,0,0,0.5), 0 0 50px currentColor; }
        }

        /* Enhanced UI Elements */
        .ui-panel h3 {
            margin: 0 0 10px 0;
            color: #ff6b6b;
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        #score {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        #timer {
            font-size: 24px;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        #health {
            display: flex;
            gap: 10px;
        }

        .heart {
            color: #e74c3c;
            font-size: 28px;
            animation: heartBeat 1.2s ease-in-out infinite;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Enhanced Mobile Controls */
        #mobileControls {
            position: absolute;
            bottom: 2vw; left: 2vw; right: 2vw;
            display: flex;
            justify-content: center;
            gap: 4vw;
            z-index: 20;
        }

        .mobile-btn {
            width: 12vw; height: 12vw;
            min-width: 48px; min-height: 48px;
            max-width: 80px; max-height: 80px;
            font-size: 5vw;
            border-radius: 50%;
            background: #fff;
            color: #333;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 1vw #aaa;
            cursor: pointer;
            transition: 0.2s;
        }
        .mobile-btn:active { background: #ffd700; }

        /* Enhanced Buttons */
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 18px 36px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.4s ease;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            font-weight: bold;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 32px rgba(0,0,0,0.4);
            background: linear-gradient(135deg, #764ba2, #667eea);
        }

        /* Enhanced Game Over Screen */
        #gameOver h2 {
            color: #ff6b6b;
            font-size: 3em;
            margin-bottom: 25px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }

        /* Enhanced Achievement Notifications */
        .achievement {
            position: fixed;
            top: 30px;
            right: 30px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: white;
            padding: 20px 25px;
            border-radius: 20px;
            border: 4px solid #ff8c00;
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
            z-index: 1000;
            transform: translateX(500px);
            transition: transform 0.6s ease;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            font-size: 18px;
        }

        .achievement.show {
            transform: translateX(0);
        }

        /* Enhanced Responsive Design */
        @media (max-width: 600px) {
            .overlay-content { padding: 6vw 2vw; }
            #ui { flex-direction: column; gap: 2vw; top: 2vw; left: 2vw; right: 2vw; }
            .ui-panel { font-size: 4vw; min-width: 40vw; }
            #player { width: 18vw; height: 18vw; font-size: 12vw; }
            .character-option { font-size: 10vw; }
            .mobile-btn { width: 18vw; height: 18vw; font-size: 10vw; }
        }

        /* Enhanced Pause Menu */
        #pauseMenu h2 {
            color: #ff6b6b;
            font-size: 2.5em;
            margin-bottom: 25px;
        }

        .pause-btn {
            margin: 15px;
            min-width: 140px;
        }

        /* Enhanced Loading Screen */
        #loadingScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            color: white;
        }

        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-top: 8px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }

        #loadingScreen h2 {
            font-size: 2.5em;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            background: linear-gradient(45deg, #ffd700, #ff6b6b, #4ecdc4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 2s ease-in-out infinite;
        }

        /* Responsive scaling for UI panels and controls */
        #ui, .ui-panel, #mobileControls, .mobile-btn, #gameOver, #pauseMenu, #characterSelect {
            box-sizing: border-box;
        }

        /* Responsive font and element sizes */
        html, body {
            font-size: calc(12px + 1vw);
        }

        .ui-panel, #gameOver, #pauseMenu, #characterSelect {
            max-width: 90vw;
        }

        /* Remove any extra margin/padding from body and html */
        body, html {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <!-- Animated Background Stars -->
    <div class="stars" id="stars"></div>

    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loading-spinner"></div>
        <h2>Loading Kaden & Adelynn's Adventure...</h2>
    </div>

    <div id="gameContainer">
        <div class="gameArea">
            <!-- Player always present -->
            <div id="player"></div>

            <!-- Overlays -->
            <div id="characterSelect" class="overlay-flex">
                <div class="overlay-content">
                    <h1>🚀 Kaden & Adelynn Coin Catcher Adventure! 🚀</h1>
                    <p>Choose your character and start collecting coins in space!</p>
                    <div class="character-grid">
                        <div class="character-option" data-character="boy">👦</div>
                        <div class="character-option" data-character="girl">👧</div>
                        <div class="character-option" data-character="car">🚗</div>
                        <div class="character-option" data-character="spaceship">🚀</div>
                        <div class="character-option" data-character="army">🪖</div>
                        <div class="character-option" data-character="barbie">👸</div>
                    </div>
                    <button class="btn" id="startBtn">Start Adventure!</button>
                </div>
            </div>
            <div id="gameOver" class="overlay-flex">
                <div class="overlay-content">
                    <h2>🎮 Game Over! 🎮</h2>
                    <p id="finalScore">Final Score: 0</p>
                    <button class="btn" id="restartBtn">Play Again!</button>
                </div>
            </div>

            <!-- UI Panels -->
            <div id="ui">
                <div class="ui-panel">
                    <h3>Score</h3>
                    <div id="score">0</div>
                </div>
                <div class="ui-panel">
                    <h3>Time</h3>
                    <div id="timer">60</div>
                </div>
            </div>

            <!-- Mobile Controls -->
            <div id="mobileControls">
                <div class="mobile-btn" id="leftBtn">⬅️</div>
                <div class="mobile-btn" id="rightBtn">➡️</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // All event listeners with null checks
            var startBtn = document.getElementById('startBtn');
            if (startBtn) startBtn.addEventListener('click', startGame);
            var restartBtn = document.getElementById('restartBtn');
            if (restartBtn) restartBtn.addEventListener('click', startGame);
            var leftBtn = document.getElementById('leftBtn');
            if (leftBtn) leftBtn.addEventListener('click', moveLeft);
            var rightBtn = document.getElementById('rightBtn');
            if (rightBtn) rightBtn.addEventListener('click', moveRight);
            // Add other event listeners as needed, always with null checks
        });

        // Game Variables
        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let timer = 60;
        let health = 3;
        let selectedCharacter = 'boy';
        let playerX = 50;
        let playerY = 0;
        let isJumping = false;
        let isSliding = false;
        let gameSpeed = 1;
        let obstacles = [];
        let coins = [];
        let powerups = [];
        let missiles = [];
        let gameInterval;
        let timerInterval;
        let achievements = [];
        let powerupActive = false;
        let powerupType = '';
        let powerupTimer = 0;

        // DOM Elements
        const player = document.getElementById('player');
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const healthElement = document.getElementById('health');
        const characterSelect = document.getElementById('characterSelect');
        const gameOverScreen = document.getElementById('gameOver');
        const pauseMenu = document.getElementById('pauseMenu');
        const loadingScreen = document.getElementById('loadingScreen');

        function checkRequiredElements() {
            if (!player || !scoreElement || !timerElement || !healthElement || !characterSelect || !gameOverScreen || !pauseMenu) {
                console.error('Missing required game element. Game cannot start.');
                return false;
            }
            return true;
        }

        // Initialize Stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Character Selection
        document.querySelectorAll('.character-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.character-option').forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
                selectedCharacter = option.dataset.character;
                updatePlayerCharacter();
            });
        });

        function updatePlayerCharacter() {
            if (!player) return;
            const characters = {
                boy: '👨‍🎮',
                girl: '👩‍🎮',
                car: '🚗',
                spaceship: '🚀',
                army: '🪖',
                barbie: '👸'
            };
            player.innerHTML = characters[selectedCharacter] || '👨‍🎮';
        }

        // Start Game
        function startGame() {
            if (!checkRequiredElements()) return;
            gameRunning = true;
            gamePaused = false;
            score = 0;
            timer = 60;
            health = 3;
            gameSpeed = 1;
            obstacles = [];
            coins = [];
            powerups = [];
            missiles = [];
            achievements = [];
            powerupActive = false;
            powerupType = '';
            powerupTimer = 0;
            
            characterSelect.style.display = 'none';
            gameOverScreen.style.display = 'none';
            pauseMenu.style.display = 'none';
            
            updateUI();
            startGameLoop();
            startTimer();
        }

        function startGameLoop() {
            gameInterval = setInterval(() => {
                if (!gameRunning || gamePaused) return;
                
                updateGame();
                spawnObjects();
                checkCollisions();
                updateUI();
            }, 50);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (!gameRunning || gamePaused) return;
                
                timer--;
                if (timer <= 0) {
                    gameOver();
                }
            }, 1000);
        }

        function updateGame() {
            if (!player) return;
            player.style.left = playerX + '%';
            player.style.bottom = (100 + playerY) + 'px';
            updateObstacles();
            updateCoins();
            updatePowerups();
            updateMissiles();
            if (powerupActive) {
                powerupTimer--;
                if (powerupTimer <= 0) {
                    deactivatePowerup();
                }
            }
        }

        function spawnObjects() {
            // Spawn coins
            if (Math.random() < 0.03) {
                spawnCoin();
            }
            
            // Spawn sharks
            if (Math.random() < 0.01) {
                spawnShark();
            }
            
            // Spawn powerups
            if (Math.random() < 0.005) {
                spawnPowerup();
            }
        }

        function spawnCoin() {
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.style.left = Math.random() * 80 + 10 + '%';
            coin.style.top = '-50px';
            document.querySelector('.gameArea').appendChild(coin);
            
            coins.push({
                element: coin,
                x: parseFloat(coin.style.left),
                y: -50,
                speed: 3 + Math.random() * 2
            });
        }

        function spawnShark() {
            const shark = document.createElement('div');
            shark.className = 'shark';
            shark.style.left = Math.random() * 80 + 10 + '%';
            shark.style.top = '-60px';
            document.querySelector('.gameArea').appendChild(shark);
            
            obstacles.push({
                element: shark,
                x: parseFloat(shark.style.left),
                y: -60,
                speed: 4 + Math.random() * 2
            });
        }

        function spawnPowerup() {
            const powerupTypes = ['speed', 'shield', 'multishot', 'timefreeze', 'autoshoot'];
            const type = powerupTypes[Math.floor(Math.random() * powerupTypes.length)];
            
            const powerup = document.createElement('div');
            powerup.className = `powerup ${type}`;
            powerup.style.left = Math.random() * 80 + 10 + '%';
            powerup.style.top = '-45px';
            document.querySelector('.gameArea').appendChild(powerup);
            
            powerups.push({
                element: powerup,
                x: parseFloat(powerup.style.left),
                y: -45,
                speed: 2 + Math.random() * 2,
                type: type
            });
        }

        function updateObstacles() {
            obstacles.forEach((obstacle, index) => {
                obstacle.y += obstacle.speed;
                obstacle.element.style.top = obstacle.y + 'px';
                
                if (obstacle.y > 700) {
                    obstacle.element.remove();
                    obstacles.splice(index, 1);
                }
            });
        }

        function updateCoins() {
            coins.forEach((coin, index) => {
                coin.y += coin.speed;
                coin.element.style.top = coin.y + 'px';
                
                if (coin.y > 700) {
                    coin.element.remove();
                    coins.splice(index, 1);
                }
            });
        }

        function updatePowerups() {
            powerups.forEach((powerup, index) => {
                powerup.y += powerup.speed;
                powerup.element.style.top = powerup.y + 'px';
                
                if (powerup.y > 700) {
                    powerup.element.remove();
                    powerups.splice(index, 1);
                }
            });
        }

        function updateMissiles() {
            missiles.forEach((missile, index) => {
                missile.y -= missile.speed;
                missile.element.style.top = missile.y + 'px';
                
                if (missile.y < -50) {
                    missile.element.remove();
                    missiles.splice(index, 1);
                }
            });
        }

        function checkCollisions() {
            const playerRect = {
                x: playerX,
                y: 100 + playerY,
                width: 8,
                height: 8
            };
            
            // Check coin collisions
            coins.forEach((coin, index) => {
                if (isColliding(playerRect, {x: coin.x, y: coin.y, width: 5, height: 5})) {
                    score += 10;
                    coin.element.remove();
                    coins.splice(index, 1);
                    checkAchievements();
                }
            });
            
            // Check shark collisions
            obstacles.forEach((obstacle, index) => {
                if (isColliding(playerRect, {x: obstacle.x, y: obstacle.y, width: 6, height: 6})) {
                    if (powerupActive && powerupType === 'shield') {
                        deactivatePowerup();
                    } else {
                        health--;
                        obstacle.element.remove();
                        obstacles.splice(index, 1);
                        
                        if (health <= 0) {
                            gameOver();
                        }
                    }
                }
            });
            
            // Check powerup collisions
            powerups.forEach((powerup, index) => {
                if (isColliding(playerRect, {x: powerup.x, y: powerup.y, width: 4.5, height: 4.5})) {
                    activatePowerup(powerup.type);
                    powerup.element.remove();
                    powerups.splice(index, 1);
                }
            });
        }

        function isColliding(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function activatePowerup(type) {
            powerupActive = true;
            powerupType = type;
            powerupTimer = 300; // 15 seconds
            
            const powerupNames = {
                speed: 'Speed Boost!',
                shield: 'Shield Active!',
                multishot: 'Multi-Shot!',
                timefreeze: 'Time Freeze!',
                autoshoot: 'Auto-Shoot!'
            };
            
            showAchievement(powerupNames[type]);
        }

        function deactivatePowerup() {
            powerupActive = false;
            powerupType = '';
            powerupTimer = 0;
        }

        function checkAchievements() {
            const milestones = [10, 25, 50, 100, 200, 500];
            milestones.forEach(milestone => {
                if (score >= milestone * 10 && !achievements.includes(milestone)) {
                    achievements.push(milestone);
                    showAchievement(`🎉 ${milestone} Coins Collected! 🎉`);
                }
            });
        }

        function showAchievement(message) {
            const achievement = document.createElement('div');
            achievement.className = 'achievement';
            achievement.textContent = message;
            document.body.appendChild(achievement);
            
            setTimeout(() => achievement.classList.add('show'), 100);
            setTimeout(() => {
                achievement.classList.remove('show');
                setTimeout(() => achievement.remove(), 500);
            }, 3000);
        }

        function updateUI() {
            if (scoreElement) scoreElement.textContent = score;
            if (timerElement) timerElement.textContent = timer;
            if (healthElement) {
                healthElement.innerHTML = '';
                for (let i = 0; i < health; i++) {
                    healthElement.innerHTML += '<span class="heart">❤️</span>';
                }
            }
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameInterval);
            clearInterval(timerInterval);
            
            document.getElementById('finalScore').textContent = `Final Score: ${score}`;
            gameOverScreen.style.display = 'block';
            
            // Clean up objects
            obstacles.forEach(obstacle => obstacle.element.remove());
            coins.forEach(coin => coin.element.remove());
            powerups.forEach(powerup => powerup.element.remove());
            missiles.forEach(missile => missile.element.remove());
        }

        // Player Movement
        function moveLeft() {
            if (playerX > 10) {
                playerX -= 5;
            }
        }

        function moveRight() {
            if (playerX < 90) {
                playerX += 5;
            }
        }

        function jump() {
            if (!isJumping) {
                isJumping = true;
                playerY = 50;
                setTimeout(() => {
                    isJumping = false;
                    playerY = 0;
                }, 500);
            }
        }

        function slide() {
            if (!isSliding) {
                isSliding = true;
                player.style.transform = 'translateX(-50%) scaleY(0.5)';
                setTimeout(() => {
                    isSliding = false;
                    player.style.transform = 'translateX(-50%) scaleY(1)';
                }, 500);
            }
        }

        // Pause Menu Functions
        function pauseGame() {
            if (gameRunning && !gamePaused) {
                gamePaused = true;
                pauseMenu.style.display = 'block';
            }
        }

        function resumeGame() {
            gamePaused = false;
            pauseMenu.style.display = 'none';
        }

        function saveGame() {
            const gameState = {
                score: score,
                timer: timer,
                health: health,
                selectedCharacter: selectedCharacter
            };
            localStorage.setItem('coinCatcherSave', JSON.stringify(gameState));
            showAchievement('💾 Game Saved! 💾');
        }

        function loadGame() {
            const savedState = localStorage.getItem('coinCatcherSave');
            if (savedState) {
                const gameState = JSON.parse(savedState);
                score = gameState.score;
                timer = gameState.timer;
                health = gameState.health;
                selectedCharacter = gameState.selectedCharacter;
                updatePlayerCharacter();
                updateUI();
                showAchievement('📂 Game Loaded! 📂');
            }
        }

        function quitToMenu() {
            gameRunning = false;
            gamePaused = false;
            clearInterval(gameInterval);
            clearInterval(timerInterval);
            
            // Clean up objects
            obstacles.forEach(obstacle => obstacle.element.remove());
            coins.forEach(coin => coin.element.remove());
            powerups.forEach(powerup => powerup.element.remove());
            missiles.forEach(missile => missile.element.remove());
            
            pauseMenu.style.display = 'none';
            characterSelect.style.display = 'block';
        }

        // Event Listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('menuBtn').addEventListener('click', quitToMenu);
        document.getElementById('resumeBtn').addEventListener('click', resumeGame);
        document.getElementById('saveBtn').addEventListener('click', saveGame);
        document.getElementById('loadBtn').addEventListener('click', loadGame);
        document.getElementById('quitBtn').addEventListener('click', quitToMenu);
        document.getElementById('pauseBtn').addEventListener('click', pauseGame);

        // Mobile Controls
        document.getElementById('leftBtn').addEventListener('click', moveLeft);
        document.getElementById('rightBtn').addEventListener('click', moveRight);
        document.getElementById('jumpBtn').addEventListener('click', jump);
        document.getElementById('slideBtn').addEventListener('click', slide);

        // Keyboard Controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || gamePaused) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    moveLeft();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    moveRight();
                    break;
                case 'ArrowUp':
                case 'w':
                case 'W':
                case ' ':
                    e.preventDefault();
                    jump();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    slide();
                    break;
                case 'Escape':
                case 'p':
                case 'P':
                    e.preventDefault();
                    pauseGame();
                    break;
            }
        });

        // Touch Controls
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            if (!gameRunning || gamePaused) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            if (!gameRunning || gamePaused) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 50) {
                    moveRight();
                } else if (deltaX < -50) {
                    moveLeft();
                }
            } else {
                if (deltaY > 50) {
                    slide();
                } else if (deltaY < -50) {
                    jump();
                }
            }
        });

        // Initialize Game
        function initGame() {
            try {
                createStars();
                updatePlayerCharacter();
                
                // Hide loading screen after a short delay
                setTimeout(() => {
                    const loadingScreen = document.getElementById('loadingScreen');
                    if (loadingScreen) {
                        loadingScreen.style.display = 'none';
                    }
                }, 1000);
            } catch (error) {
                console.error('Initialization error:', error);
                // Force hide loading screen if there's an error
                const loadingScreen = document.getElementById('loadingScreen');
                if (loadingScreen) {
                    loadingScreen.style.display = 'none';
                }
            }
        }

        // Start initialization when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initGame);
        } else {
            initGame();
        }

        // Fallback: Force hide loading screen after 3 seconds
        setTimeout(() => {
            const loadingScreen = document.getElementById('loadingScreen');
            if (loadingScreen) {
                loadingScreen.style.display = 'none';
            }
        }, 3000);
    </script>
</body>
</html>
