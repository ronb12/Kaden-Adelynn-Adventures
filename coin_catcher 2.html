<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayden & Adelynn Coin Catcher - Fun Game for Kids!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #87CEEB, #98FB98);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            position: relative;
            width: min(95vw, 800px);
            height: min(90vh, 600px);
            background: linear-gradient(to bottom, #87CEEB 0%, #98FB98 100%);
            border: 4px solid #FF6B6B;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        #player {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: min(8vw, 60px);
            height: min(8vw, 60px);
            background: #FF6B6B;
            border-radius: 50%;
            border: 4px solid #FF4757;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: left 0.1s ease;
            z-index: 10;
        }

        #player::before {
            content: var(--character-emoji, '👦');
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: min(4vw, 30px);
        }

        .coin {
            position: absolute;
            width: min(6vw, 40px);
            height: min(6vw, 40px);
            background: #FFD700;
            border-radius: 50%;
            border: 3px solid #FFA500;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            animation: spin 1s linear infinite;
            z-index: 5;
        }

        .coin::before {
            content: '💰';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: min(3vw, 20px);
        }

        @keyframes spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: min(4vw, 24px);
            font-weight: bold;
            color: #2C3E50;
            background: rgba(255, 255, 255, 0.9);
            padding: min(2vw, 10px) min(3vw, 15px);
            border-radius: 15px;
            border: 3px solid #FF6B6B;
            z-index: 15;
        }

        #timer {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: min(4vw, 24px);
            font-weight: bold;
            color: #2C3E50;
            background: rgba(255, 255, 255, 0.9);
            padding: min(2vw, 10px) min(3vw, 15px);
            border-radius: 15px;
            border: 3px solid #FF6B6B;
            z-index: 15;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: min(8vw, 40px);
            border-radius: 20px;
            text-align: center;
            border: 4px solid #FF6B6B;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 20;
            display: none;
            width: min(90vw, 400px);
        }

        #gameOver h2 {
            color: #FF6B6B;
            font-size: min(6vw, 36px);
            margin-bottom: 20px;
        }

        #gameOver p {
            color: #2C3E50;
            font-size: min(4vw, 24px);
            margin-bottom: 20px;
        }

        #restartBtn {
            background: #4ECDC4;
            color: white;
            border: none;
            padding: min(3vw, 15px) min(6vw, 30px);
            font-size: min(3.5vw, 20px);
            border-radius: 15px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.3s;
        }

        #restartBtn:hover {
            background: #45B7AA;
        }

        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: min(8vw, 40px);
            border-radius: 20px;
            text-align: center;
            border: 4px solid #FF6B6B;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 25;
            width: min(90vw, 500px);
        }

        #startScreen h1 {
            color: #FF6B6B;
            font-size: min(8vw, 48px);
            margin-bottom: 20px;
        }

        #startScreen p {
            color: #2C3E50;
            font-size: min(3.5vw, 20px);
            margin-bottom: 30px;
        }

        #characterSelection {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        #characterSelection h3 {
            color: #2C3E50;
            font-size: min(3.5vw, 20px);
            margin-bottom: 10px;
            width: 100%;
            text-align: center;
        }

        .characterOption {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: min(2vw, 8px);
            border: 2px solid #FF6B6B;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            width: min(15vw, 70px);
            min-width: 60px;
        }

        .characterOption:hover {
            transform: scale(1.05);
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .characterOption.selected {
            background: #4ECDC4;
            border-color: #45B7AA;
            color: white;
        }

        .characterOption .characterEmoji {
            font-size: min(4vw, 24px);
            display: block;
            margin-bottom: 4px;
        }

        .characterOption .characterName {
            font-size: min(2vw, 10px);
            font-weight: bold;
            text-align: center;
        }

        /* Character-specific hover effects */
        .characterOption[data-character="boy"]:hover {
            border-color: #FF4757;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .characterOption[data-character="girl"]:hover {
            border-color: #FF1493;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
        }

        .characterOption[data-character="car"]:hover {
            border-color: #FF6347;
            box-shadow: 0 5px 15px rgba(255, 69, 0, 0.3);
        }

        .characterOption[data-character="spaceship"]:hover {
            border-color: #1E90FF;
            box-shadow: 0 5px 15px rgba(65, 105, 225, 0.3);
        }

        .characterOption[data-character="army"]:hover {
            border-color: #32CD32;
            box-shadow: 0 5px 15px rgba(34, 139, 34, 0.3);
        }

        .characterOption[data-character="barbie"]:hover {
            border-color: #FF69B4;
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.3);
        }

        #startBtn {
            background: #4ECDC4;
            color: white;
            border: none;
            padding: min(3vw, 15px) min(6vw, 30px);
            font-size: min(3.5vw, 20px);
            border-radius: 15px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.3s;
        }

        #startBtn:hover {
            background: #45B7AA;
        }

        #startBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        #achievement {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
            padding: min(4vw, 20px) min(6vw, 30px);
            border-radius: 15px;
            text-align: center;
            border: 4px solid #FF6B6B;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 30;
            display: none;
            animation: achievementPop 2s ease-out;
            width: min(80vw, 300px);
        }

        #achievement h3 {
            font-size: min(5vw, 28px);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #achievement p {
            font-size: min(3.5vw, 18px);
            margin-bottom: 10px;
        }

        #achievement .achievementEmoji {
            font-size: min(6vw, 40px);
            margin-bottom: 10px;
        }

        @keyframes achievementPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
        }

        /* Responsive design */
        @media (max-width: 850px) {
            #gameContainer {
                width: 95vw;
                height: 70vh;
            }
            
            #player {
                width: 50px;
                height: 50px;
            }
            
            #player::before {
                font-size: 25px;
            }
            
            .coin {
                width: 35px;
                height: 35px;
            }
            
            .coin::before {
                font-size: 18px;
            }
            
            #score, #timer {
                font-size: 20px;
                padding: 8px 12px;
            }
        }

        @media (max-width: 600px) {
            #gameContainer {
                width: 98vw;
                height: 75vh;
            }
            
            #startScreen, #gameOver {
                width: 95vw;
                padding: 20px;
            }
            
            #startScreen h1 {
                font-size: 32px;
            }
            
            .characterOption {
                margin: 0 5px;
                padding: 8px;
                width: 60px;
            }
            
            .characterOption .characterEmoji {
                font-size: 24px;
            }
            
            .characterOption .characterName {
                font-size: 10px;
            }
        }

        @media (max-width: 400px) {
            #gameContainer {
                width: 100vw;
                height: 80vh;
            }
            
            #score, #timer {
                font-size: 16px;
                padding: 6px 10px;
            }
            
            #startScreen h1 {
                font-size: 28px;
            }
            
            #startScreen p {
                font-size: 16px;
            }
            
            .characterOption {
                margin: 0 3px;
                padding: 6px;
                width: 50px;
            }
            
            .characterOption .characterEmoji {
                font-size: 20px;
            }
            
            .characterOption .characterName {
                font-size: 8px;
            }
        }

        /* Landscape orientation for mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            #gameContainer {
                height: 90vh;
            }
            
            #startScreen, #gameOver {
                padding: 15px;
            }
            
            #startScreen h1 {
                font-size: 24px;
                margin-bottom: 10px;
            }
            
            #startScreen p {
                font-size: 14px;
                margin-bottom: 15px;
            }
            
            .characterOption {
                margin: 0 8px;
                padding: 8px;
            }
            
            .characterOption .characterEmoji {
                font-size: 24px;
            }
        }

        /* Character-specific animations */
        @keyframes carDrive {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-2px); }
        }

        @keyframes spaceshipFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-3px) rotate(1deg); }
            75% { transform: translateY(-1px) rotate(-1deg); }
        }

        @keyframes armyMarch {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-1px); }
        }

        @keyframes barbieTwirl {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* Apply character-specific animations */
        #player[data-character="car"] {
            animation: carDrive 0.5s ease-in-out infinite;
        }

        #player[data-character="spaceship"] {
            animation: spaceshipFloat 2s ease-in-out infinite;
        }

        #player[data-character="army"] {
            animation: armyMarch 0.8s ease-in-out infinite;
        }

        #player[data-character="barbie"] {
            animation: barbieTwirl 3s linear infinite;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="startScreen">
            <h1>🪙 Kayden & Adelynn Coin Catcher 🪙</h1>
            <p>Use the arrow keys to move and catch falling coins!</p>
            <p>You have 60 seconds to get the highest score!</p>
            <div id="characterSelection">
                <h3>Choose Your Character:</h3>
                <div class="characterOption" data-character="boy">
                    <div class="characterEmoji">👦</div>
                    <div class="characterName">Boy</div>
                </div>
                <div class="characterOption" data-character="girl">
                    <div class="characterEmoji">👧</div>
                    <div class="characterName">Girl</div>
                </div>
                <div class="characterOption" data-character="car">
                    <div class="characterEmoji">🚗</div>
                    <div class="characterName">Car</div>
                </div>
                <div class="characterOption" data-character="spaceship">
                    <div class="characterEmoji">🚀</div>
                    <div class="characterName">Spaceship</div>
                </div>
                <div class="characterOption" data-character="army">
                    <div class="characterEmoji">🪖</div>
                    <div class="characterName">Army Man</div>
                </div>
                <div class="characterOption" data-character="barbie">
                    <div class="characterEmoji">👸</div>
                    <div class="characterName">Barbie</div>
                </div>
            </div>
            <button id="startBtn">Start Game</button>
        </div>
        
        <div id="player"></div>
        <div id="score">Score: 0</div>
        <div id="timer">Time: 60</div>
        
        <div id="gameOver">
            <h2>🎉 Game Over! 🎉</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button id="restartBtn">Play Again</button>
        </div>
        
        <div id="achievement">
            <div class="achievementEmoji">🏆</div>
            <h3>Achievement Unlocked!</h3>
            <p id="achievementText">Great job!</p>
        </div>
    </div>

    <script>
        // Game variables
        let player = document.getElementById('player');
        let gameContainer = document.getElementById('gameContainer');
        let scoreElement = document.getElementById('score');
        let timerElement = document.getElementById('timer');
        let gameOverScreen = document.getElementById('gameOver');
        let startScreen = document.getElementById('startScreen');
        let finalScoreElement = document.getElementById('finalScore');
        
        let score = 0;
        let timeLeft = 60;
        let gameRunning = false;
        let playerX = 370; // Starting position (center)
        let coins = [];
        let gameInterval;
        let coinInterval;
        let timerInterval;
        let selectedCharacter = 'boy'; // Default character
        let achievements = []; // Track unlocked achievements
        
        // Game constants
        const PLAYER_SPEED = 35; // Increased from 20 to 35 for faster movement
        const COIN_SPEED = 3;
        let GAME_WIDTH = 800;
        let GAME_HEIGHT = 600;
        const PLAYER_WIDTH = 60;
        const COIN_WIDTH = 40;
        
        // Update game dimensions based on actual container size
        function updateGameDimensions() {
            const container = document.getElementById('gameContainer');
            GAME_WIDTH = container.offsetWidth;
            GAME_HEIGHT = container.offsetHeight;
        }
        
        // Achievement definitions
        const ACHIEVEMENTS = [
            { coins: 5, title: "Coin Collector", emoji: "🪙", message: "You collected 5 coins!" },
            { coins: 10, title: "Coin Master", emoji: "💰", message: "You collected 10 coins!" },
            { coins: 20, title: "Coin Champion", emoji: "🏆", message: "You collected 20 coins!" },
            { coins: 30, title: "Coin Legend", emoji: "👑", message: "You collected 30 coins!" },
            { coins: 50, title: "Coin God", emoji: "⭐", message: "You collected 50 coins!" }
        ];
        
        // Initialize game
        function initGame() {
            score = 0;
            timeLeft = 60;
            playerX = 370;
            coins = [];
            achievements = []; // Reset achievements
            
            // Update game dimensions for current screen size
            updateGameDimensions();
            
            // Clear existing coins
            document.querySelectorAll('.coin').forEach(coin => coin.remove());
            
            // Update displays
            scoreElement.textContent = `Score: ${score}`;
            timerElement.textContent = `Time: ${timeLeft}`;
            
            // Update player character
            updatePlayerCharacter();
            
            // Position player
            player.style.left = playerX + 'px';
            
            // Hide screens
            gameOverScreen.style.display = 'none';
            startScreen.style.display = 'none';
            
            gameRunning = true;
        }
        
        // Update player character appearance
        function updatePlayerCharacter() {
            let characterEmoji, backgroundColor, borderColor;
            
            switch(selectedCharacter) {
                case 'boy':
                    characterEmoji = '👦';
                    backgroundColor = '#FF6B6B';
                    borderColor = '#FF4757';
                    break;
                case 'girl':
                    characterEmoji = '👧';
                    backgroundColor = '#FF69B4';
                    borderColor = '#FF1493';
                    break;
                case 'car':
                    characterEmoji = '🚗';
                    backgroundColor = '#FF4500';
                    borderColor = '#FF6347';
                    break;
                case 'spaceship':
                    characterEmoji = '🚀';
                    backgroundColor = '#4169E1';
                    borderColor = '#1E90FF';
                    break;
                case 'army':
                    characterEmoji = '🪖';
                    backgroundColor = '#228B22';
                    borderColor = '#32CD32';
                    break;
                case 'barbie':
                    characterEmoji = '👸';
                    backgroundColor = '#FFB6C1';
                    borderColor = '#FF69B4';
                    break;
                default:
                    characterEmoji = '👦';
                    backgroundColor = '#FF6B6B';
                    borderColor = '#FF4757';
            }
            
            player.style.setProperty('--character-emoji', `"${characterEmoji}"`);
            player.style.backgroundColor = backgroundColor;
            player.style.borderColor = borderColor;
            player.setAttribute('data-character', selectedCharacter);
        }
        
        // Start game
        function startGame() {
            initGame();
            
            // Start game loop
            gameInterval = setInterval(gameLoop, 16); // ~60 FPS
            
            // Start coin spawning
            coinInterval = setInterval(spawnCoin, 1500);
            
            // Start timer
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        // Game loop
        function gameLoop() {
            if (!gameRunning) return;
            
            // Update coin positions
            updateCoins();
            
            // Check collisions
            checkCollisions();
        }
        
        // Spawn a new coin
        function spawnCoin() {
            if (!gameRunning) return;
            
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.style.left = Math.random() * (GAME_WIDTH - COIN_WIDTH) + 'px';
            coin.style.top = '-40px';
            gameContainer.appendChild(coin);
            
            coins.push({
                element: coin,
                x: parseInt(coin.style.left),
                y: -40
            });
        }
        
        // Update coin positions
        function updateCoins() {
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                coin.y += COIN_SPEED;
                coin.element.style.top = coin.y + 'px';
                
                // Remove coins that fall off screen
                if (coin.y > GAME_HEIGHT) {
                    coin.element.remove();
                    coins.splice(i, 1);
                }
            }
        }
        
        // Check for collisions
        function checkCollisions() {
            const playerRect = {
                left: playerX,
                right: playerX + PLAYER_WIDTH,
                top: GAME_HEIGHT - 80,
                bottom: GAME_HEIGHT - 20
            };
            
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                const coinRect = {
                    left: coin.x,
                    right: coin.x + COIN_WIDTH,
                    top: coin.y,
                    bottom: coin.y + COIN_WIDTH
                };
                
                if (playerRect.left < coinRect.right &&
                    playerRect.right > coinRect.left &&
                    playerRect.top < coinRect.bottom &&
                    playerRect.bottom > coinRect.top) {
                    
                    // Collision detected!
                    coin.element.remove();
                    coins.splice(i, 1);
                    score += 10;
                    scoreElement.textContent = `Score: ${score}`;
                }
            }
        }
        
        // Update timer
        function updateTimer() {
            if (!gameRunning) return;
            
            timeLeft--;
            timerElement.textContent = `Time: ${timeLeft}`;
            
            if (timeLeft <= 0) {
                endGame();
            }
        }
        
        // End game
        function endGame() {
            gameRunning = false;
            clearInterval(gameInterval);
            clearInterval(coinInterval);
            clearInterval(timerInterval);
            
            finalScoreElement.textContent = score;
            gameOverScreen.style.display = 'block';
        }
        
        // Restart game
        function restartGame() {
            startGame();
            gameOverScreen.style.display = 'none';
            startScreen.style.display = 'none';
        }
        
        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', restartGame);
    </script>
</body>
</html>
