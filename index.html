<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="An epic space shooter game with multiple characters, weapons, and game modes" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4ecdc4" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Space Adventures" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    
    <!-- Prevent iOS Safari from adding address bar -->
    <meta name="format-detection" content="telephone=no" />
    
    <title>Kaden & Adelynn Space Adventures</title>
    
    <style>
      /* Prevent iOS bounce scrolling and address bar issues */
      html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
        -webkit-overflow-scrolling: touch;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      
      #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      
      /* Prevent text selection on iOS */
      * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration)
            })
            .catch((error) => {
              console.log('SW registration failed:', error)
            })
        })
      }
      
      // Prevent iOS Safari bounce scrolling
      document.addEventListener('touchmove', (e) => {
        if (e.target.closest('.scrollable')) {
          return
        }
        e.preventDefault()
      }, { passive: false })
      
      // Fix iOS viewport height issue
      function setViewportHeight() {
        const vh = window.innerHeight * 0.01
        document.documentElement.style.setProperty('--vh', `${vh}px`)
      }
      setViewportHeight()
      window.addEventListener('resize', setViewportHeight)
      window.addEventListener('orientationchange', () => {
        setTimeout(setViewportHeight, 100)
      })
      
      // Prevent double-tap zoom on iOS
      let lastTouchEnd = 0
      document.addEventListener('touchend', (e) => {
        const now = Date.now()
        if (now - lastTouchEnd <= 300) {
          e.preventDefault()
        }
        lastTouchEnd = now
      }, false)
    </script>
  </body>
</html>
