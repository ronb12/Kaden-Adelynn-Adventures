<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 Kaden & Adelynn Adventures - Enhanced Edition</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="144x144" href="assets/icon-144x144.png">
    <link rel="icon" type="image/png" sizes="120x120" href="assets/icon-120x120.png">
    <link rel="icon" type="image/png" sizes="96x96" href="assets/icon-96x96.png">
    <meta name="theme-color" content="#0a0a2a">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3a 50%, #2a2a4a 100%);
            color: #ffffff;
            overflow: hidden;
            user-select: none;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #gameCanvas {
            border: 3px solid #00ffff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            background: radial-gradient(circle at center, #000033 0%, #000011 100%);
            max-width: 100vw;
            max-height: 100vh;
        }
        
        @media (max-width: 768px) {
            #gameCanvas {
                border-width: 2px;
                box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            }
        }
        
        @media (max-width: 480px) {
            #gameCanvas {
                border-width: 1px;
                box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            }
        }
        
        #ui {
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            z-index: 100;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            display: none; /* Hide UI when not playing */
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 8px;
            border-radius: 15px;
            border: 2px solid rgba(0, 255, 255, 0.5);
        }
        
        .playing #ui {
            display: flex; /* Show UI only during gameplay */
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        
        .ui-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 5px;
        }
        
        .ui-item {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 6px;
            padding: 4px 8px;
            text-align: center;
            min-width: 60px;
            flex: 1;
        }
        
        .ui-label {
            font-size: 10px;
            color: rgba(0, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        
        .ui-value {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.8);
        }
        
        .score-item {
            border-color: rgba(255, 215, 0, 0.5);
        }
        
        .score-item .ui-value {
            color: #ffd700;
        }
        
        .level-item {
            border-color: rgba(0, 255, 0, 0.5);
        }
        
        .level-item .ui-value {
            color: #00ff00;
        }
        
        .lives-item {
            border-color: rgba(255, 0, 0, 0.5);
        }
        
        .lives-item .ui-value {
            color: #ff0000;
        }
        
        .weapon-item {
            border-color: rgba(255, 165, 0, 0.5);
        }
        
        .weapon-item .ui-value {
            color: #ffa500;
        }
        
        .combo-item {
            border-color: rgba(255, 0, 255, 0.5);
        }
        
        .combo-item .ui-value {
            color: #ff00ff;
        }
        

        
        #ui div {
            margin: 0;
            font-size: 16px;
            white-space: nowrap;
        }
        
        /* Mobile responsive scoreboard */
        @media (max-width: 768px) {
            #ui {
                top: 8px;
                left: 8px;
                right: 8px;
                padding: 4px 8px;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
            
            .playing #ui {
                flex-direction: row;
                align-items: center;
                gap: 8px;
            }
            
            #ui div {
                font-size: 13px;
                margin: 0;
                white-space: nowrap;
            }
        }
        
        @media (max-width: 480px) {
            #ui {
                top: 5px;
                left: 5px;
                right: 5px;
                padding: 3px 6px;
            }
            
            .playing #ui {
                gap: 0px;
            }
            
            #ui div {
                font-size: 11px;
                margin: 0;
            }
        }
        
        @media (max-width: 360px) {
            #ui {
                top: 3px;
                left: 3px;
                right: 3px;
                padding: 2px 4px;
            }
            
            #ui div {
                font-size: 10px;
            }
        }
        
        /* Pause/Resume Button */
        .pause-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
            font-size: 20px;
            transition: all 0.3s ease;
            color: #ffffff;
        }
        
        .pause-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        
        .pause-btn.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
        
        /* Mobile Pause Button */
        .mobile-pause-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
            font-size: 20px;
            transition: all 0.3s ease;
            color: #ffffff;
        }
        
        .mobile-pause-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        
        .mobile-pause-btn.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
        
        /* Show mobile pause button only on mobile devices */
        @media (max-width: 768px) {
            .mobile-pause-btn {
                display: flex;
            }
        }
        
        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
            background: linear-gradient(135deg, 
                rgba(26, 26, 46, 0.95) 0%, 
                rgba(22, 33, 62, 0.95) 50%, 
                rgba(15, 52, 96, 0.95) 100%);
            padding: 40px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            min-width: 400px;
            max-width: 90vw;
            max-height: 90vh;
            pointer-events: auto;
            overflow-y: auto;
            overflow-x: hidden;
            display: block;
        }
        
        /* Mobile responsive menu */
        /* Custom scrollbar for menu */
        #menu::-webkit-scrollbar {
            width: 8px;
        }
        
        #menu::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }
        
        #menu::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.5);
            border-radius: 4px;
        }
        
        #menu::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 255, 0.7);
        }
        
        @media (max-width: 768px) {
            #menu {
                padding: 25px 15px;
                min-width: 280px;
                max-width: 95vw;
                max-height: 85vh;
                margin: 10px;
            }
            
            .menu-buttons {
                gap: 8px;
            }
            
            .btn {
                padding: 12px 20px;
                font-size: 14px;
                min-width: 140px;
                margin: 6px 4px;
            }
            
            .btn.primary {
                padding: 14px 24px;
                font-size: 15px;
            }
            
            .stats-panel {
                padding: 10px;
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .stat-item {
                flex: 1;
                min-width: 80px;
            }
            
            .stat-label {
                font-size: 0.7em;
            }
            
            .stat-value {
                font-size: 0.9em;
            }
            
            .subtitle {
                font-size: 0.9em;
                margin-top: 5px;
            }
        }
        
        @media (max-width: 480px) {
            #menu {
                padding: 20px 10px;
                min-width: 260px;
                max-width: 98vw;
                max-height: 80vh;
                margin: 5px;
            }
            
            .menu-buttons {
                gap: 6px;
            }
            
            .btn {
                padding: 10px 16px;
                font-size: 13px;
                min-width: 120px;
                margin: 4px 2px;
            }
            
            .btn.primary {
                padding: 12px 20px;
                font-size: 14px;
            }
            
            .stats-panel {
                padding: 8px;
                flex-direction: column;
                gap: 5px;
            }
            
            .stat-item {
                flex: none;
                padding: 2px 0;
            }
            
            .stat-label {
                font-size: 0.65em;
            }
            
            .stat-value {
                font-size: 0.8em;
            }
            
            .subtitle {
                font-size: 0.8em;
                margin-top: 3px;
            }
        }
        
        @media (max-width: 360px) {
            #menu {
                padding: 15px 8px;
                min-width: 240px;
                max-width: 99vw;
                max-height: 75vh;
                margin: 2px;
            }
            
            .menu-buttons {
                gap: 4px;
            }
            
            .btn {
                padding: 8px 12px;
                font-size: 12px;
                min-width: 100px;
                margin: 3px 1px;
            }
            
            .btn.primary {
                padding: 10px 16px;
                font-size: 13px;
            }
            
            .stats-panel {
                padding: 6px;
                gap: 3px;
            }
            
            .stat-label {
                font-size: 0.6em;
            }
            
            .stat-value {
                font-size: 0.75em;
            }
            
            .subtitle {
                font-size: 0.75em;
                margin-top: 2px;
            }
        }
        
        #menu::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.05) 50%, transparent 70%);
            animation: shimmer 4s infinite;
            pointer-events: none;
        }
        
        /* Scroll indicator for mobile */
        @media (max-width: 768px) {
            #menu::after {
                content: '↓ Scroll ↓';
                position: absolute;
                bottom: 5px;
                left: 50%;
                transform: translateX(-50%);
                font-size: 0.7em;
                color: rgba(0, 255, 255, 0.6);
                pointer-events: none;
                animation: scrollIndicator 2s ease-in-out infinite;
            }
            
            @keyframes scrollIndicator {
                0%, 100% { opacity: 0.6; }
                50% { opacity: 1; }
            }
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        #menu h1 {
            font-size: 1.4em;
            margin-bottom: 25px;
            background: linear-gradient(45deg, 
                #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            font-weight: 800;
            text-shadow: 0 0 30px rgba(79, 172, 254, 0.3);
            font-family: 'Orbitron', monospace;
            line-height: 1.2;
        }
        
        /* Mobile responsive menu title */
        @media (max-width: 768px) {
            #menu h1 {
                font-size: 1.3em;
                letter-spacing: 0.5px;
            }
        }
        
        @media (max-width: 480px) {
            #menu h1 {
                font-size: 1em;
                letter-spacing: 0.2px;
                line-height: 1.1;
            }
        }
        
        @media (max-width: 360px) {
            #menu h1 {
                font-size: 0.8em;
                letter-spacing: 0.1px;
            }
        }
        
        #menu h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(0, 255, 255, 0.8), 
                transparent
            );
        }
        
        @keyframes titleGlow {
            from { 
                filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.5));
                transform: scale(1);
            }
            to { 
                filter: drop-shadow(0 0 20px rgba(255, 0, 255, 0.8));
                transform: scale(1.05);
            }
        }
        
        @keyframes borderGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 16px 32px;
            margin: 12px 8px;
            border-radius: 12px;
            color: white;
            font-family: 'Orbitron', monospace;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
            min-width: 180px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }
        

        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #5a6fd8 0%, #6a4190 100%);
            border-color: rgba(255, 255, 255, 0.5);
            color: #ffffff;
        }
        

        
        .floating-emojis {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .floating-emojis .emoji {
            position: absolute;
            font-size: 2em;
            animation: float 6s ease-in-out infinite;
            opacity: 0.7;
        }
        
        @media (max-width: 768px) {
            .floating-emojis .emoji {
                font-size: 1.5em;
            }
        }
        
        @media (max-width: 480px) {
            .floating-emojis .emoji {
                font-size: 1.2em;
            }
        }
        
        @media (max-width: 360px) {
            .floating-emojis .emoji {
                font-size: 1em;
            }
        }
        
        .floating-emojis .emoji:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .floating-emojis .emoji:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
        .floating-emojis .emoji:nth-child(3) { top: 60%; left: 5%; animation-delay: 2s; }
        .floating-emojis .emoji:nth-child(4) { top: 70%; right: 10%; animation-delay: 3s; }
        .floating-emojis .emoji:nth-child(5) { top: 30%; left: 50%; animation-delay: 4s; }
        .floating-emojis .emoji:nth-child(6) { top: 80%; left: 30%; animation-delay: 5s; }
        .floating-emojis .emoji:nth-child(7) { top: 15%; left: 80%; animation-delay: 6s; }
        .floating-emojis .emoji:nth-child(8) { top: 50%; right: 5%; animation-delay: 7s; }
        
        @keyframes float {
            0%, 100% { 
                transform: translateY(0px) rotate(0deg) scale(1);
                opacity: 0.7;
            }
            25% { 
                transform: translateY(-20px) rotate(90deg) scale(1.1);
                opacity: 1;
            }
            50% { 
                transform: translateY(-10px) rotate(180deg) scale(0.9);
                opacity: 0.8;
            }
            75% { 
                transform: translateY(-30px) rotate(270deg) scale(1.2);
                opacity: 1;
            }
        }
        
        #pauseOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(5px);
        }
        
        #pauseMenu {
            background: linear-gradient(135deg, 
                rgba(255, 0, 150, 0.9) 0%, 
                rgba(0, 255, 255, 0.9) 50%, 
                rgba(255, 255, 0, 0.9) 100%);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #ffffff;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.5);
            animation: menuGlow 2s ease-in-out infinite;
        }
        
        #pauseMenu h2 {
            color: white;
            font-size: 2em;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        
        @media (max-width: 768px) {
            #pauseMenu {
                padding: 30px 20px;
                margin: 10px;
                max-width: 90vw;
            }
            
            #pauseMenu h2 {
                font-size: 1.5em;
                margin-bottom: 20px;
            }
        }
        
        @media (max-width: 480px) {
            #pauseMenu {
                padding: 25px 15px;
                margin: 5px;
                max-width: 95vw;
            }
            
            #pauseMenu h2 {
                font-size: 1.3em;
                margin-bottom: 15px;
            }
        }
        
        @media (max-width: 360px) {
            #pauseMenu {
                padding: 20px 10px;
                margin: 2px;
                max-width: 98vw;
            }
            
            #pauseMenu h2 {
                font-size: 1.1em;
                margin-bottom: 12px;
            }
        }
        
        /* Skill Tree Styles */
        #skillTreeOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        #skillTreeMenu {
            background: linear-gradient(135deg, 
                rgba(26, 26, 46, 0.95) 0%, 
                rgba(22, 33, 62, 0.95) 50%, 
                rgba(15, 52, 96, 0.95) 100%);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .skill-category {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        
        .skill-category h3 {
            color: #00ffff;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        
        .skill-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .skill-item:hover {
            background: rgba(0, 255, 255, 0.2);
            transform: translateX(5px);
        }
        
        .skill-name {
            font-weight: bold;
            color: #ffffff;
        }
        
        .skill-level {
            color: #00ff00;
            font-weight: bold;
        }
        
        .skill-cost {
            color: #ffff00;
            font-size: 0.9em;
        }
        
        .skill-tree-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 255, 255, 0.3);
        }
        
        .skill-points {
            color: #00ff00;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        /* Cockpit View Styles */
        #cockpitOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            pointer-events: none;
            z-index: 50;
        }
        
        .cockpit-frame {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                rgba(0, 0, 0, 0.3) 0%, 
                rgba(0, 0, 0, 0.1) 50%, 
                rgba(0, 0, 0, 0.3) 100%);
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 20px;
            margin: 10px;
        }
        
        .cockpit-hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            font-family: 'Courier New', monospace;
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
        }
        
        .hud-top, .hud-center, .hud-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .hud-item {
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            font-size: 12px;
            font-weight: bold;
        }
        
        .cockpit-crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        
        .crosshair-line {
            position: absolute;
            background: rgba(0, 255, 255, 0.8);
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }
        
        .crosshair-line.horizontal {
            width: 60px;
