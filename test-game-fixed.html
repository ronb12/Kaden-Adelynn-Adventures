<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaden & Adelynn Space Adventures - Fixed Screen Size</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }
        h1 {
            color: #4444ff;
            margin-bottom: 20px;
        }
        .game-frame {
            border: 2px solid #4444ff;
            border-radius: 10px;
            margin: 0 auto;
            max-width: 1200px;
            max-height: 800px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: none;
        }
        .info {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🚀 Kaden & Adelynn Space Adventures</h1>
    <p>Fixed Screen Size Version - Game now fits within screen bounds!</p>
    
    <div class="game-frame">
        <iframe src="SpaceAdventuresApp/index.html"></iframe>
    </div>
    
    <div class="info">
        <p>✅ Game is now contained within screen bounds</p>
        <p>✅ Responsive design that works on different screen sizes</p>
        <p>✅ No more off-screen elements</p>
        <p>✅ Optimized for desktop and mobile play</p>
    </div>
</body>
</html>
