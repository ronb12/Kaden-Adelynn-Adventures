<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freeze Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
        }
        #testOutput {
            background: #000;
            color: #0f0;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 500px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧊 Freeze Test</h1>
        <p>Testing if the game freezes due to missing drawBullets function...</p>
        
        <div id="testOutput">Running freeze test...</div>
    </div>

    <!-- Load the game -->
    <script src="js/main.js?v=2.4"></script>
    <script src="freeze_test.js"></script>
    
    <script>
        // Override console.log to display in the test output
        const testOutput = document.getElementById('testOutput');
        const originalLog = console.log;
        const originalError = console.error;
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            testOutput.textContent += args.join(' ') + '\n';
            testOutput.scrollTop = testOutput.scrollHeight;
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            testOutput.textContent += 'ERROR: ' + args.join(' ') + '\n';
            testOutput.scrollTop = testOutput.scrollHeight;
        };
    </script>
</body>
</html>
